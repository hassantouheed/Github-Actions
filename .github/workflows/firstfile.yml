name: Generating Dragon Workflow

on: push

jobs:
  first_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: List Repo Files
        run: ls -l
      - name: Give Execute Permission
        run: chmod +x shellscript.sh
      - name: Executing Shell Script
        run: ./shellscript.sh