name: practice_workflow

on: push

jobs:
  first_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout-Repo
        uses: actions/checkout@v4

      - name: List Repo Files
        run: ls -l

      - name: Executing shell script
        run: |
          chmod +x shellscript.sh
          ./shellscript.sh